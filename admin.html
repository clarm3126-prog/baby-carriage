<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>베베카 사전예약 관리자</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f8; color: #111; }
    .card { background: #fff; border: 1px solid #e5e5e7; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    input, button { font-size: 14px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; background: #111; color: #fff; border: none; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; font-size: 13px; text-align: left; }
    th { background: #fafafa; position: sticky; top: 0; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>사전예약 관리자 조회</h2>
    <p class="muted">`ADMIN_DASHBOARD_KEY`를 입력하면 최신 사전예약 목록을 조회합니다.</p>
    <input id="adminKey" type="password" placeholder="관리자 키" style="width:280px" />
    <button onclick="loadPreorders()">조회</button>
    <button onclick="downloadCsv()">CSV 다운로드</button>
    <div id="status" class="muted" style="margin-top:8px"></div>
  </div>

  <div class="card" style="overflow:auto; max-height: 70vh;">
    <table id="tbl">
      <thead>
        <tr>
          <th>requested_at</th>
          <th>order_id</th>
          <th>product_name</th>
          <th>start_date</th>
          <th>end_date</th>
          <th>baby_age</th>
          <th>use_area</th>
          <th>referral_code</th>
          <th>address</th>
          <th>total_amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let rows = [];

    function esc(v) {
      return String(v ?? '').replace(/[&<>\"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '\"':'&quot;', "'":'&#39;' }[c]));
    }

    async function loadPreorders() {
      const key = document.getElementById('adminKey').value.trim();
      if (!key) return alert('관리자 키를 입력하세요.');
      document.getElementById('status').textContent = '불러오는 중...';

      const res = await fetch('/api/admin/preorders?limit=300', {
        headers: { 'x-admin-key': key }
      });
      const data = await res.json();

      if (!data.ok) {
        document.getElementById('status').textContent = '실패: ' + (data.message || '오류');
        return;
      }

      rows = data.items || [];
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.requested_at)}</td>
          <td>${esc(r.order_id)}</td>
          <td>${esc(r.product_name)}</td>
          <td>${esc(r.start_date)}</td>
          <td>${esc(r.end_date)}</td>
          <td>${esc(r.baby_age)}</td>
          <td>${esc(r.use_area)}</td>
          <td>${esc(r.referral_code)}</td>
          <td>${esc(r.address)}</td>
          <td>${esc(r.total_amount)}</td>
        </tr>
      `).join('');

      document.getElementById('status').textContent = `총 ${rows.length}건`;
    }

    function downloadCsv() {
      if (!rows.length) return alert('먼저 조회하세요.');
      const cols = ['requested_at','order_id','product_name','start_date','end_date','baby_age','use_area','referral_code','address','total_amount'];
      const lines = [cols.join(',')].concat(rows.map(r => cols.map(c => `"${String(r[c] ?? '').replace(/"/g, '""')}"`).join(',')));
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `preorders_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
