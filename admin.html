<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>베베카 사전예약 관리자</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f8; color: #111; }
    .card { background: #fff; border: 1px solid #e5e5e7; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    input, button { font-size: 14px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; background: #111; color: #fff; border: none; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; font-size: 13px; text-align: left; }
    th { background: #fafafa; position: sticky; top: 0; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>베베카 관리자 조회</h2>
    <p class="muted">`ADMIN_DASHBOARD_KEY`를 입력하면 사전예약/회원가입 목록을 조회합니다.</p>
    <input id="adminKey" type="password" placeholder="관리자 키" style="width:280px" />
    <button onclick="switchMode('preorders')">사전예약</button>
    <button onclick="switchMode('members')">회원가입</button>
    <button onclick="loadCurrent()">조회</button>
    <button onclick="downloadCsv()">CSV 다운로드</button>
    <div id="status" class="muted" style="margin-top:8px"></div>
  </div>

  <div class="card" style="overflow:auto; max-height: 70vh;">
    <table id="tbl">
      <thead>
        <tr>
          <th>requested_at</th>
          <th>order_id</th>
          <th>product_name</th>
          <th>start_date</th>
          <th>end_date</th>
          <th>baby_age</th>
          <th>use_area</th>
          <th>inflow_source</th>
          <th>address</th>
          <th>total_amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let rows = [];
    let mode = 'preorders';
    const MODE = {
      preorders: {
        label: '사전예약',
        endpoint: '/api/admin/preorders?limit=300',
        cols: ['requested_at','order_id','product_name','start_date','end_date','baby_age','use_area','referral_code','address','total_amount']
      },
      members: {
        label: '회원가입',
        endpoint: '/api/admin/members?limit=300',
        cols: ['created_at','member_uid','provider','name','phone','email','marketing_opt_in','auth_flow','last_login_at']
      }
    };

    function esc(v) {
      return String(v ?? '').replace(/[&<>\"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '\"':'&quot;', "'":'&#39;' }[c]));
    }

    function renderHeader() {
      const cfg = MODE[mode];
      document.querySelector('#tbl thead').innerHTML = `<tr>${cfg.cols.map(c => `<th>${esc(c)}</th>`).join('')}</tr>`;
    }

    function renderRows() {
      const cfg = MODE[mode];
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = rows.map(r => `<tr>${cfg.cols.map(c => `<td>${esc(r[c])}</td>`).join('')}</tr>`).join('');
    }

    function switchMode(next) {
      if (!MODE[next]) return;
      mode = next;
      rows = [];
      renderHeader();
      document.querySelector('#tbl tbody').innerHTML = '';
      document.getElementById('status').textContent = `${MODE[mode].label} 모드`;
    }

    async function loadCurrent() {
      const key = document.getElementById('adminKey').value.trim();
      if (!key) return alert('관리자 키를 입력하세요.');
      document.getElementById('status').textContent = '불러오는 중...';

      const res = await fetch(MODE[mode].endpoint, {
        headers: { 'x-admin-key': key }
      });
      const data = await res.json();

      if (!data.ok) {
        document.getElementById('status').textContent = '실패: ' + (data.message || '오류');
        return;
      }

      rows = data.items || [];
      renderRows();
      document.getElementById('status').textContent = `${MODE[mode].label} 총 ${rows.length}건`;
    }

    function downloadCsv() {
      if (!rows.length) return alert('먼저 조회하세요.');
      const cols = MODE[mode].cols;
      const lines = [cols.join(',')].concat(rows.map(r => cols.map(c => `"${String(r[c] ?? '').replace(/"/g, '""')}"`).join(',')));
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${mode}_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    renderHeader();
  </script>
</body>
</html>
